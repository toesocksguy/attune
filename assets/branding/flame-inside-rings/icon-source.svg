<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Attune flame inside rings app icon">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="66%">
      <stop offset="0" stop-color="#7B4FA6" stop-opacity="0.18"/>
      <stop offset="0.58" stop-color="#1C1528" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#0D0A12"/>
    </radialGradient>
    <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8A0B8"/>
      <stop offset="0.54" stop-color="#C49AE8"/>
      <stop offset="1" stop-color="#7B4FA6"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E8A0B8" stop-opacity="0.5"/>
      <stop offset="0.34" stop-color="#C49AE8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#C49AE8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flameAura" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E8A0B8" stop-opacity="0.48"/>
      <stop offset="0.42" stop-color="#C49AE8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7B4FA6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.77 0 0 0 0 0.60 0 0 0 0 0.91 0 0 0 0.18 0"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0D0A12"/>
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <circle cx="512" cy="512" r="276" fill="url(#centerGlow)"/>
  <g fill="none" stroke="#C49AE8" stroke-linecap="round" opacity="0.72">
    <circle cx="418" cy="512" r="214" stroke-width="9"/>
    <circle cx="606" cy="512" r="214" stroke-width="9"/>
  </g>
  <ellipse id="flame-aura" cx="512" cy="548" rx="172" ry="232" fill="url(#flameAura)"/>
  <!-- Edit these two paths to tweak the flame shape. The same path data is used in adaptive-foreground.svg and splash-source.svg. -->
  <g id="flame-mark" transform="translate(512 512) scale(4.45) translate(-21 -36)">
    <path id="flame-outer" d="M21 4 C 31 18 36 31 36 43 C 36 55 30 62 21 62 C 12 62 6 55 6 43 C 6 32 13 23 18 14 C 18 22 16 29 21 34 C 25 26 19 15 21 4 Z" fill="url(#flameGrad)" opacity="0.92"/>
    <path id="flame-inner" d="M21 23 C 26 31 29 38 28 45 C 27 52 24 56 21 56 C 18 56 15 52 14 45 C 13 38 16 31 21 23 Z" fill="#F0EAF8" opacity="0.48"/>
  </g>
  <g fill="none" stroke="#524569" stroke-width="2" opacity="0.22">
    <circle cx="512" cy="512" r="352"/>
    <circle cx="512" cy="512" r="388" stroke-dasharray="2 20"/>
  </g>
  <rect width="1024" height="1024" filter="url(#grain)" opacity="0.35"/>
</svg>
