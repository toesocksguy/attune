<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 432 432">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E8A0B8" stop-opacity="0.56"/>
      <stop offset="0.3" stop-color="#C49AE8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#C49AE8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="216" cy="216" r="116" fill="url(#centerGlow)"/>
  <g filter="url(#softGlow)" fill="none" stroke="#C49AE8" stroke-linecap="round">
    <circle cx="176" cy="216" r="90" stroke-width="5" opacity="0.88"/>
    <circle cx="256" cy="216" r="90" stroke-width="5" opacity="0.88"/>
    <circle cx="216" cy="216" r="2.2" fill="#F0EAF8" stroke="none" opacity="0.86"/>
  </g>
</svg>
