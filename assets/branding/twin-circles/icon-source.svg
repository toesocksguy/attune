<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Attune twin circles app icon">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="66%">
      <stop offset="0" stop-color="#7B4FA6" stop-opacity="0.18"/>
      <stop offset="0.58" stop-color="#1C1528" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#0D0A12"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E8A0B8" stop-opacity="0.62"/>
      <stop offset="0.3" stop-color="#C49AE8" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#C49AE8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.77 0 0 0 0 0.60 0 0 0 0 0.91 0 0 0 0.18 0"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0D0A12"/>
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <circle cx="512" cy="512" r="276" fill="url(#centerGlow)"/>
  <g filter="url(#softGlow)" fill="none" stroke="#C49AE8" stroke-linecap="round">
    <circle cx="418" cy="512" r="214" stroke-width="11" opacity="0.88"/>
    <circle cx="606" cy="512" r="214" stroke-width="11" opacity="0.88"/>
    <circle cx="512" cy="512" r="5" fill="#F0EAF8" stroke="none" opacity="0.86"/>
  </g>
  <g fill="none" stroke="#524569" stroke-width="2" opacity="0.24">
    <circle cx="512" cy="512" r="336"/>
    <circle cx="512" cy="512" r="372" stroke-dasharray="2 20"/>
  </g>
  <rect width="1024" height="1024" filter="url(#grain)" opacity="0.35"/>
</svg>
